<mat-toolbar color="primary" class="app-header">
  @if (isHandset()) {
    <button mat-icon-button (click)="sidenav.toggle()" aria-label="Open menu">
      <mat-icon>menu</mat-icon>
    </button>
  }
  <span class="brand-logo">{{ title }}</span>
  <span class="spacer"></span>
  <button
    mat-icon-button
    (click)="themeService.toggleTheme()"
    [aria-label]="
      themeService.isDarkTheme() ? 'Switch to light' : 'Switch to dark'
    "
  >
    <mat-icon>{{
      themeService.isDarkTheme() ? "light_mode" : "dark_mode"
    }}</mat-icon>
  </button>
</mat-toolbar>

<mat-sidenav-container class="app-shell">
  <mat-sidenav
    #sidenav
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
  >
    <nav class="side-nav">
      <a
        routerLink="/dashboard"
        routerLinkActive="active-link"
        (click)="isHandset() && sidenav.close()"
      >
        <mat-icon>grid_view</mat-icon> Dashboard
      </a>
      <a
        routerLink="/projects"
        routerLinkActive="active-link"
        (click)="isHandset() && sidenav.close()"
      >
        <mat-icon>assignment</mat-icon> Projects
      </a>
      <a
        routerLink="/settings"
        routerLinkActive="active-link"
        (click)="isHandset() && sidenav.close()"
      >
        <mat-icon>settings</mat-icon> Settings
      </a>
    </nav>
  </mat-sidenav>

  <mat-sidenav-content>
    <main class="u-container" role="main">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
