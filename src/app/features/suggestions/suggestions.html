<mat-card>
  <mat-card-header>
    <mat-card-title>
      <mat-icon>lightbulb</mat-icon>
      Smart Suggestions
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    @if (isLoading) {
    <mat-spinner diameter="30"></mat-spinner>
    } @else if (suggestions.length > 0) {
    <mat-list role="list">
      @for (suggestion of suggestions; track suggestion) {
      <mat-list-item role="listitem">{{ suggestion }}</mat-list-item>
      }
    </mat-list>
    } @else {
    <p>
      No suggestions available right now. Keep tracking your time to generate
      new insights!
    </p>
    }
  </mat-card-content>
</mat-card>
