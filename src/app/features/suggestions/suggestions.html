<mat-card>
  <mat-card-header>
    <mat-card-title>
      <mat-icon>lightbulb</mat-icon>
      Smart Suggestions
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    @if (suggestions$ | async; as suggestions) { @if (suggestions.length > 0) {
    <mat-list role="list">
      @for (suggestion of suggestions; track suggestion) {
      <mat-list-item
        role="listitem"
        class="suggestion-item"
        [innerHTML]="suggestion"
      >
      </mat-list-item>
      }
    </mat-list>
    } @else {
    <p>
      No suggestions available right now. Keep tracking your time to generate
      new insights!
    </p>
    } } @else {
    <mat-spinner diameter="30"></mat-spinner>
    }
  </mat-card-content>
</mat-card>
