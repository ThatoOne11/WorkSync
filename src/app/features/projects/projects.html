<div class="projects-view">
  <header class="page-header">
    <div class="header-content">
      <h2>Projects</h2>
      <p class="u-text-muted">Manage your monthly hour allocations.</p>
    </div>
    <button
      mat-stroked-button
      color="warn"
      (click)="onMonthlyRollover()"
      class="rollover-btn"
    >
      <mat-icon>auto_delete</mat-icon>
      Start New Month
    </button>
  </header>

  <div class="projects-layout">
    <section class="card form-section">
      <header class="card-header">
        <h3>{{ selectedProject() ? "Edit Allocation" : "New Project" }}</h3>
      </header>
      <app-project-form
        [project]="selectedProject()"
        [clockifyProjects]="availableClockifyProjects()"
        (save)="onSaveProject($event)"
        (cancel)="onCancelEdit()"
      />
    </section>

    <section class="card list-section">
      <header class="card-header">
        <h3>Active Projects</h3>
      </header>
      @if (projects().length > 0) {
        <app-project-list
          [projects]="projects()"
          (edit)="onEditProject($event)"
          (delete)="onDeleteProject($event)"
        />
      } @else {
        <div class="empty-state">
          <p class="u-text-muted">
            No active projects. Link a Clockify project to begin.
          </p>
        </div>
      }
    </section>
  </div>
</div>
