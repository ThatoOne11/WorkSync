<div class="projects-container">
  <div class="header-actions">
    <h2>Projects</h2>
    <button mat-stroked-button color="warn" (click)="onMonthlyRollover()">
      <mat-icon>archive</mat-icon>
      Start New Month
    </button>
  </div>

  <div class="projects-layout">
    <mat-card class="project-form-card">
      <mat-card-header>
        <mat-card-title>{{
          selectedProject() ? "Edit Project" : "Add New Project"
        }}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <app-project-form
          [project]="selectedProject()"
          [clockifyProjects]="availableClockifyProjects()"
          (save)="onSaveProject($event)"
        />
      </mat-card-content>
    </mat-card>

    <mat-card class="project-list-card">
      <mat-card-header>
        <mat-card-title>Active Projects</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        @if (projects().length > 0) {
        <app-project-list
          [projects]="projects()"
          (edit)="onEditProject($event)"
          (delete)="onDeleteProject($event)"
        />
        } @else {
        <p class="no-projects-message">
          No active projects. Add one using the form above.
        </p>
        }
      </mat-card-content>
    </mat-card>
  </div>
</div>
