<div class="header-actions">
  <h2>Projects</h2>
  <div>
    <button mat-stroked-button color="warn" (click)="onMonthlyRollover()">
      <mat-icon>archive</mat-icon>
      Start New Month (Archive All)
    </button>
    <button mat-raised-button color="primary" (click)="onNewProject()">
      <mat-icon>add</mat-icon>
      Add New Project
    </button>
  </div>
</div>

<app-project-form
  [project]="selectedProject()"
  [clockifyProjects]="clockifyProjects()"
  (save)="onSaveProject($event)"
/>

<app-project-list
  [projects]="projects()"
  (edit)="onEditProject($event)"
  (delete)="onDeleteProject($event)"
/>
