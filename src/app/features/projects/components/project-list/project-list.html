<table mat-table [dataSource]="projects()" class="mat-elevation-z8">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Project Name</th>
    <td mat-cell *matCellDef="let project">{{ project.name }}</td>
  </ng-container>

  <ng-container matColumnDef="target_hours">
    <th mat-header-cell *matHeaderCellDef class="u-text-secondary">
      Target (hrs)
    </th>
    <td mat-cell *matCellDef="let project">{{ project.target_hours }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef class="u-text-secondary">Actions</th>
    <td mat-cell *matCellDef="let project">
      <a
        mat-icon-button
        color="accent"
        [routerLink]="['/projects', project.id, 'history']"
        aria-label="View Project History"
      >
        <mat-icon>trending_up</mat-icon>
      </a>
      <button
        mat-icon-button
        color="primary"
        (click)="edit.emit(project)"
        aria-label="Edit Project"
      >
        <mat-icon>edit</mat-icon>
      </button>
      <button
        mat-icon-button
        color="warn"
        (click)="delete.emit(project.id)"
        aria-label="Delete Project"
      >
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr
    mat-row
    *matRowDef="let row; columns: displayedColumns"
    class="project-row"
  ></tr>
</table>
