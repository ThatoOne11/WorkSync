<h2>Dashboard</h2>

<div class="dashboard-panels">
  <app-suggestions></app-suggestions>
  <app-today-focus></app-today-focus>
</div>

<br />

@if (projects().length > 0) {
<div class="project-cards-container">
  @for (project of projects(); track project.id) {
  <mat-card
    [class.positive-balance]="project.balance >= 0"
    [class.negative-balance]="project.balance < 0"
  >
    <mat-card-header>
      <mat-card-title>{{ project.name }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="project-stats">
        <span>Target: {{ project.target_hours }} hrs</span>
        <span>Logged: {{ project.loggedHours }} hrs</span>
      </div>
      <mat-progress-bar
        mode="determinate"
        [value]="(project.loggedHours / project.target_hours) * 100"
        [color]="project.balance < 0 ? 'warn' : 'primary'"
      >
      </mat-progress-bar>
      <h3>Balance: {{ project.balance }} hrs</h3>
    </mat-card-content>
  </mat-card>
  }
</div>
} @else {
<p>No projects found, or settings are not configured.</p>
}
